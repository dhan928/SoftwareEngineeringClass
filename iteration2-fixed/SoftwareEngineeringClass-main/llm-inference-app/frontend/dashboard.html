<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LLM Chat</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-dashboard">
        <div class="nav-container">
            <div class="logo">
                <h1>LLM Chat</h1>
            </div>
            <button id="navLogoutBtn" class="btn btn-logout">Logout</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="dashboard-layout">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="user-profile">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <span id="userName" class="user-name"></span>
                    </div>
                    <button id="newChatBtn" class="btn btn-primary btn-block">+ New Chat</button>
                </div>

                <div class="sidebar-section">
                    <h3>History</h3>
                    <input id="historySearch" class="history-search" type="text" placeholder="Search conversations...">
                    <div class="history-list" id="historyList">
                        <p class="empty-state">No saved conversations yet</p>
                    </div>
                </div>
            </aside>

            <div class="chat-area">
                <div class="chat-header">
                    <h2 id="chatTitle">New Chat</h2>
                    <p>Saved automatically. Reopen any thread from the sidebar.</p>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <h3>Start a conversation</h3>
                        <p>Your messages, saved history, search, and resume thread flow are all supported here.</p>
                    </div>
                </div>

                <div class="chat-input-area">
                    <form id="chatForm" class="chat-form">
                        <div class="chat-form-row">
                            <textarea id="promptInput" class="chat-input" placeholder="Ask me anything..." rows="3" required></textarea>
                            <button type="submit" class="btn btn-primary btn-send">Send</button>
                        </div>
                        <span class="error-message" id="chatError"></span>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>
</html>
